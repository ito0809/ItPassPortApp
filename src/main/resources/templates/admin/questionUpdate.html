<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>管理者ページ</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="admin-main">
    <section class="admin-hero">
        <p class="admin-kicker">Question Update</p>
        <h1>問題編集</h1>
        <p class="admin-lead">現在の内容を確認しながら、対象の問題を更新できます。</p>
    </section>

    <section class="admin-section">
        <div class="admin-section-header">
            <div>
                <p class="admin-section-label">Current Data</p>
                <h2>登録されている内容</h2>
            </div>
        </div>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>分野</th>
                    <th>問題文</th>
                    <th>選択肢1</th>
                    <th>選択肢2</th>
                    <th>選択肢3</th>
                    <th>選択肢4</th>
                    <th>正解</th>
                    <th>解説</th>
                    <th>実際の試験での例文</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td th:text="${#strings.equals(#strings.trim(question.field), 'strategy') ? 'ストラテジ' :
                                    #strings.equals(#strings.trim(question.field), 'management') ? 'マネジメント' :
                                    #strings.equals(#strings.trim(question.field), 'technology') ? 'テクノロジ' :
                                    question.field}">
                    </td>
                    <td th:text="${question.questionText}"></td>
                    <td th:text="${question.choice1}"></td>
                    <td th:text="${question.choice2}"></td>
                    <td th:text="${question.choice3}"></td>
                    <td th:text="${question.choice4}"></td>
                    <td th:text="${question.correctAnswer}"></td>
                    <td th:text="${question.explanation}"></td>
                    <td th:text="${question.realExamExample}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="admin-section">
        <div class="admin-section-header">
            <div>
                <p class="admin-section-label">Edit Form</p>
                <h2>編集する</h2>
            </div>
        </div>
        <form th:object="${question}" th:action="@{/questionUpdate}" method="post" class="admin-form-grid">
            <input type="hidden" th:field="*{id}">

            <div class="admin-field">
                <label for="question-field">分野</label>
                <select id="question-field" th:field="*{field}">
                    <option value="strategy">ストラテジ</option>
                    <option value="management">マネジメント</option>
                    <option value="technology">テクノロジ</option>
                </select>
            </div>

            <div class="admin-field">
                <label for="question-text">問題文</label>
                <textarea id="question-text" th:field="*{questionText}"></textarea>
            </div>

            <div class="admin-question-grid-columns">
                <div class="admin-field">
                    <label for="choice-1">選択肢1</label>
                    <input id="choice-1" type="text" th:field="*{choice1}">
                </div>
                <div class="admin-field">
                    <label for="choice-2">選択肢2</label>
                    <input id="choice-2" type="text" th:field="*{choice2}">
                </div>
                <div class="admin-field">
                    <label for="choice-3">選択肢3</label>
                    <input id="choice-3" type="text" th:field="*{choice3}">
                </div>
                <div class="admin-field">
                    <label for="choice-4">選択肢4</label>
                    <input id="choice-4" type="text" th:field="*{choice4}">
                </div>
            </div>

            <div class="admin-field">
                <label for="correct-answer">正解</label>
                <select id="correct-answer" th:field="*{correctAnswer}">
                    <option value="1">選択肢1</option>
                    <option value="2">選択肢2</option>
                    <option value="3">選択肢3</option>
                    <option value="4">選択肢4</option>
                </select>
            </div>

            <div class="admin-field">
                <label for="explanation">解説</label>
                <textarea id="explanation" th:field="*{explanation}"></textarea>
            </div>

            <div class="admin-field">
                <label for="real-exam">実例</label>
                <textarea id="real-exam" th:field="*{realExamExample}"></textarea>
            </div>

            <div class="admin-form-actions">
                <button type="submit" class="admin-button">更新する</button>
                <a th:href="@{/question_control_page}" class="admin-link-button">問題一覧へ戻る</a>
            </div>
        </form>
    </section>
</main>
</body>
<hr>
<footer>
    <p class="copyright">
        © 2026 ITパス学習アプリ
    </p>


    <p class="credits">

    </p>
</footer>
</html>
