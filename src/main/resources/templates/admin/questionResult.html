<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>管理者ページ</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="admin-main">
  <section class="admin-hero">
    <p class="admin-kicker">Result</p>
    <h1>登録・更新結果</h1>
    <p class="admin-lead">処理結果と対象の問題内容を確認できます。</p>
  </section>

  <section class="admin-section">
    <div class="admin-section-header">
      <div>
        <p class="admin-section-label">Status</p>
        <h2>処理結果</h2>
      </div>
    </div>

    <p th:if="${success}" th:text="${success}" class="admin-message admin-message-success"></p>
    <p th:if="${error}" th:text="${error}" class="admin-message admin-message-error"></p>

    <div class="admin-table-wrap" th:if="${newQuestions != null}">
      <table class="admin-table">
        <thead>
        <tr>
          <th>編集・削除</th>
          <th>分野</th>
          <th>問題文</th>
          <th>選択肢1</th>
          <th>選択肢2</th>
          <th>選択肢3</th>
          <th>選択肢4</th>
          <th>正解</th>
          <th>解説</th>
          <th>実際の試験での例文</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="q : ${newQuestions}">
          <td>
            <div class="admin-table-actions">
              <form th:action ="@{/questionUpdate}" method="get">
                <input type="hidden" name="id" th:value="${q.id}">
                <button type="submit" class="admin-inline-button">編集</button>
              </form>
              <form th:action ="@{/questionDelete}" method="post">
                <input type="hidden" name="id" th:value="${q.id}">
                <button type="submit" class="admin-danger-button">削除</button>
              </form>
            </div>
          </td>

          <td th:text="${#strings.equals(#strings.trim(q.field), 'strategy') ? 'ストラテジ' :
                      #strings.equals(#strings.trim(q.field), 'management') ? 'マネジメント' :
                      #strings.equals(#strings.trim(q.field), 'technology') ? 'テクノロジ' :
                      q.field}">
          </td>

          <td th:text="${q.questionText}"></td>
          <td th:text="${q.choice1}"></td>
          <td th:text="${q.choice2}"></td>
          <td th:text="${q.choice3}"></td>
          <td th:text="${q.choice4}"></td>
          <td th:text="${q.correctAnswer}"></td>
          <td th:text="${q.explanation}"></td>
          <td th:text="${q.realExamExample}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>

  <div class="admin-back-link-wrap">
    <a th:href="@{/question_control_page}" class="admin-back-link">← 問題一覧に戻る</a>
  </div>
</main>
</body>
<hr>
<footer>
  <p class="copyright">
    © 2026 ITパス学習アプリ
  </p>


  <p class="credits">

  </p>
</footer>
</html>
