<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>管理者ページ</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="admin-main">
    <section class="admin-hero">
        <p class="admin-kicker">Question Control</p>
        <h1>問題管理ページ</h1>
        <p class="admin-lead">登録済み問題の検索、一覧確認、編集、削除、新規追加を一つの画面で管理できます。</p>
    </section>

    <section class="admin-section">
        <div class="admin-section-header">
            <div>
                <p class="admin-section-label">Search</p>
                <h2>問題を検索する</h2>
            </div>
        </div>
        <form th:action ="@{/question_control_page}" method="get" class="admin-search-form">
            <select name="field">
                <option value="" selected>全て</option>
                <option value="strategy">ストラテジ</option>
                <option value="management">マネジメント</option>
                <option value="technology">テクノロジ</option>
            </select>
            <input type="text" name="keyword" placeholder="キーワード検索">
            <button type="submit" class="admin-button">検索</button>
        </form>
    </section>

    <section class="admin-section">
        <div class="admin-section-header">
            <div>
                <p class="admin-section-label" th:text="${(keyword != null and keyword != '') or (field != null and field != '')} ? 'Result' : 'All Questions'">All Questions</p>
                <h2 th:text="${(keyword != null and keyword != '') or (field != null and field != '')} ? '検索結果' : '問題一覧'">問題一覧</h2>
            </div>
            <div class="admin-toolbar">
                <a th:href="@{/question_add}" class="admin-link-button">問題を追加</a>
                <a th:href="@{/admin}" class="admin-link-button">管理者ページに戻る</a>
            </div>
        </div>

        <p class="admin-note" th:if="${(keyword != null and keyword != '') or (field != null and field != '')}">
            条件に一致した問題を表示しています。
        </p>

        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                <tr>
                    <th class="admin-col-actions">編集・削除</th>
                    <th class="admin-col-field">分野</th>
                    <th class="admin-col-question">問題文</th>
                    <th class="admin-col-choices">選択肢</th>
                    <th class="admin-col-answer">正解</th>
                    <th class="admin-col-explanation">解説</th>
                    <th class="admin-col-real-exam">実際の試験での例文</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="q:${questions}">
                    <td>
                        <div class="admin-table-actions">
                            <form th:action ="@{questionUpdate}" method="get">
                                <input type="hidden" name="id" th:value="${q.id}">
                                <button type="submit" class="admin-inline-button">編集</button>
                            </form>
                            <form th:action ="@{questionDelete}" method="post">
                                <input type="hidden" name="id" th:value="${q.id}">
                                <button type="submit" class="admin-danger-button">削除</button>
                            </form>
                        </div>
                    </td>
                    <td th:text="${#strings.equalsIgnoreCase(#strings.trim(q.field), 'strategy') ? 'ストラテジ' :
                                #strings.equalsIgnoreCase(#strings.trim(q.field), 'management') ? 'マネジメント' :
                                #strings.equalsIgnoreCase(#strings.trim(q.field), 'technology') ? 'テクノロジ' :
                                q.field}">
                    </td>
                    <td>
                        <details class="admin-expandable">
                            <summary>
<!--                                <p class="admin-cell-title">問題</p>-->
                                <span class="admin-expandable-summary" th:text="${q.questionText}"></span>
                            </summary>
                            <span class="admin-expandable-toggle"></span>
                        </details>
                    </td>
                    <td>
                        <ol class="admin-choice-list">
                            <li th:text="${q.choice1}"></li>
                            <li th:text="${q.choice2}"></li>
                            <li th:text="${q.choice3}"></li>
                            <li th:text="${q.choice4}"></li>
                        </ol>
                    </td>
                    <td>
                        <span class="admin-answer-badge" th:text="${q.correctAnswer}"></span>
                    </td>
                    <td>
                        <details class="admin-expandable">
                            <summary>
                                <span class="admin-expandable-summary admin-cell-preview" th:text="${q.explanation}"></span>
                            </summary>
                            <span class="admin-expandable-toggle"></span>
                        </details>
                    </td>
                    <td>
                        <details class="admin-expandable">
                            <summary>
                                <span class="admin-expandable-summary admin-cell-preview"
                                      th:text="${#strings.isEmpty(q.realExamExample) ? '未登録' : q.realExamExample}"></span>
                            </summary>
                            <span class="admin-expandable-toggle"></span>
                        </details>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <div class="admin-back-link-wrap">
        <a th:href="@{/admin}" class="admin-back-link">← 管理者ページに戻る</a>
    </div>
</main>
</body>
<hr>
<footer>
    <p class="copyright">
        © 2026 ITパス学習アプリ
    </p>


    <p class="credits">

    </p>
</footer>
</html>
