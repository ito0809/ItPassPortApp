<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>管理者ページ</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <header th:replace="~{fragments/header :: siteHeader}"></header>
  <main class="admin-main">
    <section class="admin-hero">
      <p class="admin-kicker">Admin Console</p>
      <h1>管理者ページ</h1>
      <p class="admin-lead">問題の登録・編集・削除と、管理者アカウントの追加をここからまとめて操作できます。</p>
    </section>

    <section class="admin-grid">
      <article class="admin-card">
        <p class="admin-section-label">Question Control</p>
        <h2>問題管理</h2>
        <p>問題の検索、登録、編集、削除まで一連の管理作業を行います。</p>
        <div class="admin-action-list">
          <a th:href="@{/question_control_page}" class="admin-link-button">問題管理へ進む</a>
        </div>
      </article>

      <article class="admin-card">
        <p class="admin-section-label">Admin Account</p>
        <h2>管理者追加</h2>
        <p>新しい管理者アカウントを追加し、運用メンバーを増やせます。</p>
        <div class="admin-action-list">
          <a th:href="@{admin_add}" class="admin-link-button">管理者を追加する</a>
        </div>
      </article>
    </section>

    <div class="admin-back-link-wrap">
      <a th:href="@{/}" class="admin-back-link">← トップページに戻る</a>
    </div>
  </main>
</body>
<hr>
<footer>
  <p class="copyright">
    © 2026 ITパス学習アプリ
  </p>


  <p class="credits">

  </p>
</footer>
</html>
