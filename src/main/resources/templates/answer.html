<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">

<head>
  <meta charset="UTF-8">
  <title>ITパス学習アプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/answer.css">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>

  <main>
    <div class ="main-title">
      <div class="main-title" th:switch="${field}">
        <h1>
          <span th:case="'strategy'">ストラテジ</span>
          <span th:case="'management'">マネジメント</span>
          <span th:case="'technology'">テクノロジ</span>
          <span th:case="*">分野</span>
        </h1>
      </div>
    </div>
    <article class="answer">
        <h1>解 答</h1>
      <div class="answer-result-g">
        <article class="answer-result">
          <p>
            選んだ解答：<span th:text="${selectedText}"></span>
          </p>
          <p class="correct_answer" th:if="${isCorrect}">✅正解！</p>
          <p class="correct_answer" th:unless="${isCorrect}">❌不正解...</p>

          <p th:text="${explanation_text}">
          <!--  画像がある時-->
            <!--  画像がある時-->
        </article>
        <img src="/images/explain/top.png" alt="画像" class="answer-result-img" >
      </div>
    </article>
    <!-- ✅ 試験ではこう出る！は「次へリンク」と独立させる -->
    <article class="test" th:if="${examText != null}">
      <hr>
      <h3>実際の試験ではこう出る！</h3>
      <p th:text="${examText}"></p>
      <hr>
    </article>
    <div class="buttun">
      <a class="again"
         th:if="${hasPrev}"
         th:href="@{/question(field=${field}, index=${prevIndex})}">
        &lt; &lt; 前の問題
      </a>
      <a class="again"
         th:href="@{/question(field=${field}, index=${index})}">
        &lt; 今の問題
      </a>
      <a class="again"
         th:href="@{/question(field=${field}, index=0)}">
        最初の問題
      </a>
      <a class="next" th:if="${hasNext}"
         th:href="@{/question(field=${field}, index=${nextIndex})}">
        次の問題へ &gt;
      </a><br>
    </div>
    <p th:unless="${hasNext}">最後の問題でした！</p>
    <a class="top-page" href="/">← トップに戻る</a><br>
  </main>
</body>
<footer>
  <p class="copyright">
    © 2026 ITパス学習アプリ
  </p>
  <p class="credits index-credits">
    イラスト提供<br>
    <a href="https://jp.freepik.com/free-vector/team-programmers-working-program-code-with-laptops-teamwork-male-female-professional-testers-coders-flat-vector-illustration-software-development-programming-lesson-concept_22344038.htm">著作者：pch.vector／出典：Freepik</a><br>
  </p>
</footer>
</html>
