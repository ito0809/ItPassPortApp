  <!--一覧よう-->

  <section class="review-card review-empty" th:if ="${message}">
    <p th:text="${message}"></p>
  </section>

  <section class="review-card" th:if="${questions != null and !#lists.isEmpty(questions)}">
    <div class="review-section-head">
      <div>
        <p class="review-section-label">Wrong Questions</p>
        <h2>問題一覧</h2>
      </div>
      <p class="review-count" th:text="${#lists.size(questions)} + '件'">0件</p>
    </div>

    <div class="review-table-wrap">
      <table class="review-table">
        <thead>
        <tr>
          <th>操　作</th>
          <th>分　野</th>
          <th>問　題　文</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="q, stat : ${questions}">
          <td class="review-action-cell">
            <a th:href="@{/wrongQuestions(index=${stat.index})}" class="review-link">
              復習する
            </a>
          </td>
          <td class="review-field-cell" th:text="${#strings.equals(#strings.trim(q.field), 'strategy') ? 'ストラテジ' :
                  #strings.equals(#strings.trim(q.field), 'management') ? 'マネジメント' :
                  #strings.equals(#strings.trim(q.field), 'technology') ? 'テクノロジ' :
                  q.field}">
          </td>
          <td class="review-question-text" th:text="${q.questionText}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
