<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>ITパス学習アプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/question.css">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main>
  <div class ="main-title">
    <div class="main-title" th:switch="${question.field}">
      <h1>
        <span th:case="'strategy'">ストラテジ</span>
        <span th:case="'management'">マネジメント</span>
        <span th:case="'technology'">テクノロジ</span>
        <span th:case="*">分野</span>
      </h1>
    </div>
    <p th:if="${message}" th:text="${message}" style="color:red;"></p>
  </div>
  <article class="question-aria">
    <div class="question-text">
      <h1>問題：</h1>
      <p th:text="${question.questionText}" style="white-space: pre-line;"></p>
    </div>

    <div class="question-button">
      <form th:action="@{/wrongQuestionsAnswer}" method="post">
        <input type="hidden" name="questionId" th:value="${question.id}">
        <input type="hidden" name="index" th:value="${index}">

        <button type="submit" name="selected" value="1" th:text="${question.choice1}"></button>
        <button type="submit" name="selected" value="2" th:text="${question.choice2}"></button>
        <button type="submit" name="selected" value="3" th:text="${question.choice3}"></button>
        <button type="submit" name="selected" value="4" th:text="${question.choice4}"></button>
      </form>
    </div>
  </article>
</main>
</body>
<a class="top-page" href="/">← トップに戻る</a><br>
<footer>
  <p class="copyright">
    © 2026 ITパス学習アプリ
  </p>

  <p class="credits">
    イラスト提供：

  </p>
</footer>
</html>
